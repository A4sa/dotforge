#  Description : Annotated tmux configuration for embedded systems engineers.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  TMUX CORE CONCEPTS — READ THIS FIRST                                    │
# │                                                                          │
# │  tmux has three layers. Understanding them makes everything else click:  │
# │                                                                          │
# │  SESSION                                                                 │
# │  ────────                                                                │
# │  A session is a container that lives on the server independently of      │
# │  your terminal. It persists even after you close GNOME Terminal,         │
# │  disconnect SSH, or reboot the display. This is the killer feature:      │
# │  a 2-hour kernel build keeps running after you close the window.         │
# │  You can have multiple sessions — one per project or per board.          │
# │                                                                          │
# │  WINDOW                                                                  │
# │  ────────                                                                │
# │  A window lives inside a session. Think of it as a tab in a browser.     │
# │  Each window has a name and fills the entire terminal. You can have      │
# │  many windows per session — one for BSP work, one for ADB, one for       │
# │  documentation.                                                          │
# │                                                                          │
# │  PANE                                                                    │
# │  ────────                                                                │
# │  A pane is a subdivision of a window. This is what you want for your     │
# │  3-terminal workflow: one window split into 3 panes — Vim on the left,   │
# │  build output in the middle, serial log on the right. All panes are      │
# │  visible simultaneously in one window.                                   │
# │                                                                          │
# │  VISUAL MODEL:                                                           │
# │                                                                          │
# │  ┌─ GNOME Terminal ────────────────────────────────────────────────┐     │
# │  │ ┌─ tmux session: "cv25-bsp" ──────────────────────────────────┐ │     │
# │  │ │ [0:vim] [1:adb] [2:docs]  ← windows (tabs)                  │ │     │ 
# │  │ │ ┌───────────────┬──────────────┬───────────────┐            │ │     │
# │  │ │ │  Vim editor   │  make -j8    │  dmesg -w     │            │ │     │
# │  │ │ │  (pane 0)     │  (pane 1)    │  (pane 2)     │            │ │     │
# │  │ │ │               │              │               │            │ │     │
# │  │ │ └───────────────┴──────────────┴───────────────┘            │ │     │
# │  │ └────────────────────────────────────────────────────────────-┘ │     │
# │  └─────────────────────────────────────────────────────────────────┘     │
# └──────────────────────────────────────────────────────────────────────────┘
#
#  INSTALL
#  -------
#  sudo apt install tmux
#  Place this file at: ~/.tmux.conf
#  Reload without restarting: tmux source ~/.tmux.conf
#                         or: Prefix + r  (mapped below)
#
#  FIRST START
#  -----------
#  tmux                          → start a new unnamed session
#  tmux new -s cv25-bsp          → start a named session
#  tmux attach                   → re-attach to last session
#  tmux attach -t cv25-bsp       → re-attach to a named session
#  tmux ls                       → list all sessions
#
# ==================================================================================


# ============================================================================
# [1]  PREFIX KEY
# ============================================================================
#
# WHAT IS THE PREFIX?
# -------------------
# Every tmux command starts with a prefix key — a chord that tells tmux
# "the next key is for you, not the shell". Think of it as tmux's <Leader>.
#
# DEFAULT: Ctrl+B
#
# TIP: To send a literal Ctrl+B to the shell (e.g., for a program that
# uses it), press Prefix twice: Ctrl+B Ctrl+B.


# ============================================================================
# [2]  CORE BEHAVIOR
# ============================================================================
set -g base-index 1                 " Start window and pane numbering at 1 instead of 0
set -g pane-base-index 1             
set -g renumber-windows on          " Re-number windows sequentially when one is closed           
set -sg escape-time 0               " Remove the delay after pressing Escape in tmux
set -g history-limit 50000          " Increase the scrollback buffer size
set -g set-titles on                " Allow tmux to set the terminal title (shown in GNOME Terminal's tab)
set -g set-titles-string "#S: #W"
set -g focus-events on              " Respond to focus events from the terminal
setw -g aggressive-resize on        " Use aggressive resize — resize the window to the smallest attached


# ============================================================================
# [3]  TERMINAL & COLOR
# ============================================================================
" Declare the terminal type that tmux presents to programs inside it
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"


# ============================================================================
# [4]  MOUSE SUPPORT
# ============================================================================
set -g mouse on      " Enable full mouse support in tmux"

"  When scrolling with the mouse wheel, don't exit copy mode on release.
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M


# ============================================================================
# [5]  PANE SPLITTING
# ============================================================================


" Split current pane horizontally (new pane below) — your Ctrl+H.
bind -n C-h split-window -v -c "#{pane_current_path}"

" Split current pane vertically (new pane to the right) — Ctrl+V.
bind -n C-v split-window -h -c "#{pane_current_path}"

" Keep the default Prefix+" and Prefix+% splits as well.
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

" Open a new pane in the project root (Prefix+H/V).
bind H split-window -v -c "~"
bind V split-window -h -c "~"


# ============================================================================
# [6]  PANE NAVIGATION
# ============================================================================
#
#   Alt+Arrow  — move between panes without any prefix key
#                Fast, no chords, works naturally
#
#   Prefix+hjkl — Vim-style navigation with the prefix
#                 Familiar if you're comfortable with Vim motions

" Switch pane focus with Alt+Arrow keys (no prefix required).
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D


" Cycle to the next/previous pane with Prefix+n / Prefix+p (within window).
bind -r n select-pane -t :.+
bind -r p select-pane -t :.-

" Zoom a pane to full-screen with Prefix+z (toggle).
# bind z resize-pane -Z  ← already default, no need to remap


# ============================================================================
# [7]  PANE RESIZING
# ============================================================================

" Resize panes with Prefix + Shift+Arrow, in steps of 5 rows/columns.
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

" Fine-grain resize (1 row/column at a time) with Alt+Shift+Arrow.
bind -r M-S-Left  resize-pane -L 1
bind -r M-S-Right resize-pane -R 1
bind -r M-S-Up    resize-pane -U 1
bind -r M-S-Down  resize-pane -D 1

" Equalize all panes to the same size with Prefix+ = |
bind = select-layout even-horizontal
bind | select-layout even-vertical


# ============================================================================
# [8]  WINDOW MANAGEMENT
# ============================================================================

" Create a new window with Prefix+c, opening in the current directory.
bind c new-window -c "#{pane_current_path}"

" Navigate windows with Prefix+[ and Prefix+] (previous/next).
bind [ previous-window
bind ] next-window

" Jump directly to window by number with Prefix+1 through Prefix+9.

" Move (swap) the current window left/right in the tab bar.
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# WHAT: ""Rename the current window.
# bind ,  command-prompt "rename-window '%%'"  ← already default

"Close the current window (and all its panes) with Prefix+X.
bind X confirm-before -p "Kill window #W? (y/n)" kill-window



# ============================================================================
# [9]  SESSION MANAGEMENT
# ============================================================================
#
# SESSIONS ARE THE SUPERPOWER
# ----------------------------
# The embedded development loop:
#
#   Morning:
#     tmux new -s cv25-bsp        → start your session
#     (set up your 3-pane layout)
#     → work all day
#
#   Leave the office / close laptop:
#     (just close GNOME Terminal — don't kill tmux)
#     → build keeps running, session is alive
#
#   Next morning / remote SSH:
#     tmux attach -t cv25-bsp     → everything exactly as you left it
#     → Vim is open, build output is visible, serial log is scrolling
#

" Create a new named session from within tmux.
bind S command-prompt "new-session -s '%%'"

" Switch between sessions interactively.
bind s choose-session

" Detach from the current session (leave it running in the background).
# bind d detach-client  ← already default


# ============================================================================
# [10]  STATUS BAR
# ============================================================================
#
#  ┌────────────────────────────────────────────────────────────────────────┐
#  │ [cv25-bsp]  1:vim  2:build* 3:adb       abdul@dev  14:32  27-Apr-2025 │
#  └────────────────────────────────────────────────────────────────────────┘
#   └─ session ─┘ └─── windows ────────────┘ └──── right status ─────────┘
#
" Always show the status bar.
set -g status on

" Refresh the status bar every 5 seconds.
set -g status-interval 5

" Status bar colors — matching gruvbox dark theme.
set -g status-style "bg=#282828,fg=#ebdbb2"

" Left section — show session name in a colored bracket.
set -g status-left-length 30
set -g status-left "#[bg=#458588,fg=#282828,bold] #S #[bg=#282828,fg=#458588] "

" Right section — username, hostname, and time.
set -g status-right-length 60
set -g status-right "#[fg=#a89984] #[fg=#b8bb26]#(whoami)#[fg=#a89984]@#[fg=#83a598]#H #[fg=#a89984]| #[fg=#fabd2f]%H:%M #[fg=#a89984]%d-%b-%Y"

" Window tab appearance — inactive windows.
set -g window-status-format " #I:#W#F "
set -g window-status-style "bg=#282828,fg=#a89984"

" Window tab appearance — the active (current) window.
set -g window-status-current-format " #I:#W#F "
set -g window-status-current-style "bg=#3c3836,fg=#fabd2f,bold"

" Window tab appearance — a window with activity (new output).
set -g window-status-activity-style "bg=#282828,fg=#fb4934"

" Visual bell instead of audible.
set -g visual-bell on
set -g bell-action other    # only alert when activity is in a non-current window



# ============================================================================
# [11]  COPY MODE
# ============================================================================
#
# WHAT IS COPY MODE?
# ------------------
# Copy mode lets you scroll back through a pane's history, search it,
# and select text to copy — without leaving tmux. Essential for:
#   - Reading build errors that scrolled off screen
#   - Copying a dmesg error message
#   - Searching kernel boot output for a specific driver line
#
# ENTER copy mode: Prefix+[ (or scroll the mouse wheel up)
# EXIT  copy mode: q or Escape
#
# This config uses VI KEYS in copy mode — consistent with your Vim muscle memory.

"Use vi key bindings in copy mode.
setw -g mode-keys vi

" Enter copy mode with Prefix+[ (already default, confirmed here).
bind [ copy-mode

" In copy mode, start a selection with 'v' (like Vim visual mode).
bind -T copy-mode-vi v send-keys -X begin-selection

" In copy mode, select rectangular blocks with Ctrl+V.
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

" In copy mode, yank (copy) the selection with 'y'.
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

" In copy mode, search forward with '/' and backward with '?'.
# '/' then type pattern → forward search
# '?' then type pattern → backward search
# 'n' → next match, 'N' → previous match

" Paste the most recent tmux buffer with Prefix+].

" Paste from system clipboard with Prefix+P.
bind P run "xclip -out -selection clipboard | tmux load-buffer - && tmux paste-buffer"


# ============================================================================
# [12]  LAYOUTS — YOUR EMBEDDED WORKFLOWS
# ============================================================================
#
# LAYOUT A: BSP DEVELOPMENT (3 panes)
# Use for: Edit code | Build & run | Check logs
# ─────────────────────────────────────────────────────────────────────────────
#
#  ┌──────────────────┬──────────────┐
#  │                  │  make -j8    │
#  │   vim            │  (build)     │
#  │   (editor)       ├──────────────┤
#  │                  │  dmesg -w    │
#  │                  │  (log)       │
#  └──────────────────┴──────────────┘
#
#  HOW TO BUILD:
#  1. Start with a single pane (new window or session)
#  2. Ctrl+V           → split right (Vim stays left, new pane on right)
#  3. Focus right pane (Alt+Right or click)
#  4. Ctrl+H           → split the right pane horizontally (top: build, bottom: log)
#  5. Focus left pane  (Alt+Left or click)
#  6. vim .            → open Vim in the left pane
#  7. Focus top-right  → run: make -j$(nproc) 2>&1 | tee build.log
#  8. Focus bottom-right → run: sudo dmesg -w
#
#  RESULT: Left 60% = Vim, top-right 20% = build output, bottom-right 20% = live log
#
#  RESIZE to taste:
#    Prefix+Shift+Right  → make left (Vim) pane wider
#    Focus right pane → Prefix+Shift+Up → make build pane taller
#
# LAYOUT B: DUAL ADB SHELL (2 panes)
# Use for: Two independent adb shells on different devices / namespaces
# ─────────────────────────────────────────────────────────────────────────────
#
#  ┌──────────────────┬──────────────────┐
#  │                  │                  │
#  │  adb shell       │  adb shell       │
#  │  (device A)      │  (device B)      │
#  │                  │                  │
#  └──────────────────┴──────────────────┘
#
#  HOW TO BUILD:
#  1. Ctrl+V           → split right
#  2. Left pane:  adb -s <device_A_serial> shell
#  3. Right pane: adb -s <device_B_serial> shell
#
# LAYOUT C: SERIAL CONSOLE + EDITOR (2 panes)
# Use for: Edit DTS/driver on the left, watch serial console on the right
# ─────────────────────────────────────────────────────────────────────────────
#
#  ┌──────────────────┬──────────────────┐
#  │                  │                  │
#  │  vim dts/driver  │  picocom serial  │
#  │                  │  console         │
#  │                  │                  │
#  └──────────────────┴──────────────────┘
#
#  HOW TO BUILD:
#  1. Ctrl+V           → split right
#  2. Left pane:  vim cv25_hazelnut.dts
#  3. Right pane: con   (your picocom alias from bash_aliases)
#

" One-key shortcut to build Layout A (BSP 3-pane) automatically.
bind A \
  split-window -h -c "#{pane_current_path}" \;\
  split-window -v -c "#{pane_current_path}" \;\
  select-pane -t 0 \;\
  send-keys "echo '=== EDITOR PANE — run: vim . ==='" Enter \;\
  select-pane -t 1 \;\
  send-keys "echo '=== BUILD PANE — run: make -j\$(nproc) ==='" Enter \;\
  select-pane -t 2 \;\
  send-keys "echo '=== LOG PANE — run: sudo dmesg -w ==='" Enter \;\
  select-pane -t 0

" One-key shortcut to build Layout B (dual ADB) automatically.
bind B \
  split-window -h -c "#{pane_current_path}" \;\
  select-pane -t 0 \;\
  send-keys "echo '=== ADB PANE A — run: adb -s <serial_A> shell ==='" Enter \;\
  select-pane -t 1 \;\
  send-keys "echo '=== ADB PANE B — run: adb -s <serial_B> shell ==='" Enter \;\
  select-pane -t 0


# ============================================================================
# [13]  RELOAD CONFIG
# ============================================================================

" Reload this config file without restarting tmux (Prefix+r).
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

" Open this config file for editing directly from tmux(Prefix+e).
bind e new-window -n "tmux-config" "vim ~/.tmux.conf"


# ============================================================================
# COMPLETE KEY REFERENCE
# ============================================================================
#
#  All bindings use Prefix (Ctrl+B) unless marked [DIRECT] (no prefix needed)
#
#  SPLITTING PANES
#  ───────────────────────────────────────────────────────────────────────────
#  Ctrl+H          [DIRECT]  Horizontal split — new pane below
#  Ctrl+V          [DIRECT]  Vertical split   — new pane to the right
#  Prefix + "                Horizontal split (fallback, same as Ctrl+H)
#  Prefix + %                Vertical split   (fallback, same as Ctrl+V)
#  Prefix + H                Horizontal split from home directory
#  Prefix + V                Vertical split from home directory
#
#  NAVIGATING PANES
#  ───────────────────────────────────────────────────────────────────────────
#  Alt+Left/Right/Up/Down [DIRECT]  Move focus to pane in that direction
#  Prefix + h/j/k/l                 Move focus (Vim-style)
#  Prefix + n                       Next pane
#  Prefix + p                       Previous pane
#  Prefix + z                       Zoom current pane (toggle full-screen)
#  Prefix + q                       Show pane numbers (press number to jump)
#
#  RESIZING PANES
#  ───────────────────────────────────────────────────────────────────────────
#  Prefix + Shift+Arrow    Resize pane by 5 rows/cols
#  Prefix + Alt+Shift+Arrow  Resize pane by 1 row/col
#  Prefix + =              Equalize all panes (even-horizontal)
#  Prefix + |              Equalize all panes (even-vertical)
#  Mouse drag border       Drag the dividing line to resize
#
#  CLOSING PANES
#  ───────────────────────────────────────────────────────────────────────────
#  exit / Ctrl+D           Close pane (standard shell exit)
#  Prefix + x              Kill current pane (with confirmation)
#
#  WINDOWS
#  ───────────────────────────────────────────────────────────────────────────
#  Prefix + c              New window (opens in current directory)
#  Prefix + [              Previous window
#  Prefix + ]              Next window
#  Prefix + 1-9            Jump to window by number
#  Prefix + ,              Rename current window
#  Prefix + <              Move window left
#  Prefix + >              Move window right
#  Prefix + X              Kill window (with confirmation)
#
#  SESSIONS
#  ───────────────────────────────────────────────────────────────────────────
#  Prefix + d              Detach (session keeps running)
#  Prefix + s              Choose session interactively
#  Prefix + S              Create new named session
#  tmux new -s <name>      Start new named session (from shell)
#  tmux attach -t <name>   Re-attach to session (from shell)
#  tmux ls                 List all sessions (from shell)
#  tmux kill-session -t X  Kill a named session (from shell)
#
#  LAYOUTS (your embedded workflows)
#  ───────────────────────────────────────────────────────────────────────────
#  Prefix + A              Build 3-pane BSP layout (editor|build|log)
#  Prefix + B              Build 2-pane ADB layout (shell A | shell B)
#
#  COPY MODE
#  ───────────────────────────────────────────────────────────────────────────
#  Prefix + [              Enter copy mode (or scroll wheel up)
#  q / Escape              Exit copy mode
#  / or ?                  Search forward / backward
#  n / N                   Next / previous search result
#  v                       Start selection (like Vim visual)
#  y                       Yank (copy) selection to clipboard
#  Ctrl+V                  Toggle rectangular selection
#  Prefix + ]              Paste tmux buffer
#  Prefix + P              Paste from system clipboard
#
#  CONFIG
#  ───────────────────────────────────────────────────────────────────────────
#  Prefix + r              Reload ~/.tmux.conf
#  Prefix + e              Open ~/.tmux.conf in Vim
#
# ============================================================================


